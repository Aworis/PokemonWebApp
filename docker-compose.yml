services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-hauspost_db}
      MYSQL_USER: ${DB_USER:-hauspost}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hauspost}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-hauspost}", "-p${DB_PASSWORD:-hauspost}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-hauspost_db}
      DB_USER: ${DB_USER:-hauspost}
      DB_PASSWORD: ${DB_PASSWORD:-hauspost}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER:-hauspost}
      PMA_PASSWORD: ${DB_PASSWORD:-hauspost}
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data:
